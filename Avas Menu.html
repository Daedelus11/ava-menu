<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ava's Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ee;
    --card: #fff9f2;
    --accent1: #e8734a;
    --accent2: #5b9e8f;
    --accent3: #d4a843;
    --text: #2d2417;
    --muted: #9a8878;
    --border: #e8d8c8;
    --shadow: rgba(100,60,20,0.10);
    --tag-bg: #fdeee4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Quicksand', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px 0;
  }

  header {
    background: linear-gradient(135deg, #e8734a 0%, #d4a843 100%);
    padding: 36px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '🍜 🍕 🥗 🍳 🥞 🍲';
    position: absolute;
    top: 6px; left: 0; right: 0;
    font-size: 18px;
    opacity: 0.25;
    letter-spacing: 14px;
    pointer-events: none;
  }
  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 2.4rem;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.18);
    letter-spacing: 2px;
  }
  header p {
    color: rgba(255,255,255,0.88);
    font-size: 1rem;
    margin-top: 6px;
    font-weight: 500;
  }

  .date-bar {
    text-align: center;
    padding: 10px;
    font-size: 0.85rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--card);
    font-weight: 600;
    letter-spacing: 1px;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section-card {
    background: var(--card);
    border-radius: 18px;
    border: 1.5px solid var(--border);
    box-shadow: 0 4px 18px var(--shadow);
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .section-card:nth-child(1) { animation-delay: 0.05s; }
  .section-card:nth-child(2) { animation-delay: 0.12s; }
  .section-card:nth-child(3) { animation-delay: 0.19s; }
  .section-card:nth-child(4) { animation-delay: 0.26s; }
  .section-card:nth-child(5) { animation-delay: 0.33s; }
  .section-card:nth-child(6) { animation-delay: 0.40s; }
  .section-card:nth-child(7) { animation-delay: 0.47s; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px 12px;
    border-bottom: 1.5px solid var(--border);
    background: linear-gradient(90deg, rgba(232,115,74,0.07), transparent);
  }
  .section-icon { font-size: 1.5rem; }
  .section-title {
    font
